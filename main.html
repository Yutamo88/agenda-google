<main>

    <!-- Botones -->
    <div class="d-flex justify-content-center my-3">
            <!-- FORMULARIO 
            onsubmit evita el comportamiento automático del formulario
            y permite que JavaScript controle qué se actualiza.
            -->
        <form onsubmit="insertarContacto()" method="dialog" id="formulario">

            <div class="mb-3">
                <label for="nombre" class="form-label">Introduce el nombre del contacto</label>
                <input type="text" name="nombre" id="nombre" class="form-control">
            </div>

            <div lass="mb-3">
                <label for="correo" class="form-label">Introduce el correo del contacto</label>
                <input type="email" name="correo" id="correo" class="form-control">
            </div>

            <!-- Botones Formulario-->
            
            <button type="button" class="btn btn-dark m-3" onclick="crearTablaContactos()">
                Mostrar contactos 
            </button>

            <button type="submit" class="btn btn-primary">
                Crear contacto
            </button>
        </form>        
    </div>

    <!-- Tabla -->
    <div class="container col-12 col-lg-6 mb-4 w-50 d-flex justify-content-center" id="divContactos">

    </div>

    <!--NOTIFICACIONES-->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div id="notificacion" class="toast" role="alert" aria-live="assertive" aria-atomic="true">

            <div class="toast-header" id="icono-notificacion">
                <div id="icono-notificacion"><i id="iconoNotificacion"></i></div>
                <strong class="me-auto" id="tituloNotificacion"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>

            <div class="toast-body" id="textoNotificacion">
                
            </div>

        </div>
    </div>

</main>
