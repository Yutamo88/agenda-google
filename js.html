<script>

   function crearTablaContactos() {
        google.script.run
        .withSuccessHandler(crearTablaContactosCorrectamente)
        .withFailureHandler(crearTablaContactosError)
        .obtenerContactos();
   };

    function crearTablaContactosCorrectamente(obj) {

        let tabla = document.getElementById('tablaContactos');
        if (tabla) {
            tabla.remove();
        }

        tabla = document.createElement('table');
        tabla.id = 'tablaContactos';

        let tablaHeader = document.createElement('thead');
        let tablaBody = document.createElement('tbody');

        //fila del header
        let primeraFila = document.createElement('tr');

        for(let i=0; i<obj[0].length; i++) {

            let celdaPrimeraFila = document.createElement('td');
            celdaPrimeraFila.textContent = obj[0][i];
            primeraFila.appendChild(celdaPrimeraFila);
        }
        tablaHeader.appendChild(primeraFila);
        tabla.appendChild(tablaHeader);

        //Se añade la informacion de TBODY
        for(let i=1; i < obj.length; i++) {
            let fila = document.createElement('tr');

            for(let j=0; j < obj[i].length; j++){
                let celda = document.createElement('td');
                celda.textContent = obj[i][j];
                fila.appendChild(celda);
            };
            tablaBody.appendChild(fila);
        };
        //agregamos clases al a cabecera 
        tablaHeader.classList.add('fw-bold', 'text-decoration-underline');
        //agregamos el cuerpo a la tabla
        tabla.appendChild(tablaBody);
        //agregar clases a la tabla
        tabla.classList.add('table', 'table-striped', 'border', 'border-4', 'border-dark');
        //agregamos tabla a la pagina
        document.getElementById('divContactos').appendChild(tabla);

        //mostrar notificacion Exitosa
        crearNotificacion(NOTIFICACION_OK, 'Contactos obtenidos correctamente', 'EJECUCION CORRECTA');
    }

    function crearTablaContactosError() {
        //mostrar notificacion de error
        crearNotificacion(NOTIFICACION_DANGER, 'Los datos no se obtuvieron', 'EJECUCION FALLIDA');
    };

    //crea la instancia general de la notificacion
    function crearNotificacion(mensaje, titulo) {
        document.getElementById("textoNotificacion").textContent = mensaje;
        document.getElementById("tituloNotificacion").textContent = titulo;
        let elementNotificacion = document.getElementById("notificacion");
        bootstrap.Toast.getOrCreateInstance(elementNotificacion).show();

    }

    //las siguientes funcines crean las notificacion segun el estado: OK, Warning and Danger
    function crearNotificacionOK(mensaje, titulo) {
        //llamo la funcion de crear notifiacion general
        crearNotificacion(mensaje, titulo);
        crearIconoNotificacionOK();
        crearColorNotificacion('--color-verde-oscuro');
    }

    function crearNotificacionDanger(mensaje, titulo) {
        //llamo la funcion de crear notifiacion general
        crearNotificacion(mensaje, titulo);
        crearIconoNotificacionDanger();
        crearColorNotificacion('--color-rojo-oscuro');

    }

    function crearNotificacionWarning(mensaje, titulo) {
        //llamo la funcion de crear notifiacion general
        crearNotificacion(mensaje, titulo);
        crearIconoNotificacionWarning();
        crearColorNotificacion('--color-amarillo-oscuro');
    }

    //las siguientes funcines crean los iconos de las notificaciones segun el estado
    function crearIconoNotificacionOK() {
        let iconoNotificacion = document.getElementById("iconoNotificacion");
        iconoNotificacion.className = '';
        iconoNotificacion.classList.add('bi','bi-check-square');
    }


    function crearIconoNotificacionDanger() {
        let iconoNotificacion = document.getElementById("iconoNotificacion");
        iconoNotificacion.className = '';
        iconoNotificacion.classList.add('bi','bi-bug');
    }

    function crearIconoNotificacionWarning() {
        let iconoNotificacion = document.getElementById("iconoNotificacion");
        iconoNotificacion.className = '';
        iconoNotificacion.classList.add('bi','bi-exclamation-octagon');
    }

    //La siguiente funcion cambia el color de la notificacion
    function crearColorNotificacion(color) {
        let elementNotificacion = document.getElementById("notificacion");
        elementNotificacion.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue(color);
    }

    function crearNotificacionOLD(tipo, mensaje, titulo) {
        //obtener los datos
        let textoNotificacion = document.getElementById("textoNotificacion");
        let tituloNotificacion = document.getElementById("tituloNotificacion");
        let elementNotificacion = document.getElementById("notificacion");
        let iconoNotificacion = document.getElementById("iconoNotificacion");
        let notificacion = bootstrap.Toast.getOrCreateInstance(elementNotificacion);

        //editar texto notificacion 
        textoNotificacion.textContent = mensaje;
        tituloNotificacion.textContent = titulo;

        //editar variables notificacion

        switch(tipo) {
            case NOTIFICACION_OK:
            iconoNotificacion.className = '';
            iconoNotificacion.classList.add('bi','bi-check-square');
            elementNotificacion.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--color-verde-oscuro');
            break;
            case NOTIFICACION_DANGER:
            iconoNotificacion.className = '';
            iconoNotificacion.classList.add('bi','bi-bug');
            elementNotificacion.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--color-rojo-oscuro');
            break;
            case NOTIFICACION_WARNING:
            iconoNotificacion.className = '';
            iconoNotificacion.classList.add('bi','bi-exclamation-octagon');
            elementNotificacion.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--color-amarillo-oscuro');
            break;
        }

        //mostrar notificacion
        notificacion.show();
    }


</script>
